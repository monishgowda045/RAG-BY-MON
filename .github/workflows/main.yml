name: Python Docker Build and Push

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: 

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 1. Setup Python (Optional but good for pre-build checks)
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies & Lint
        run: |
          python -m pip install --upgrade pip
          pip install flake8
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          # This ensures we don't build a broken image
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      # 2. Log in to Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      # 3. Build and Push the Docker image
      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Replace 'monishgowda045' with your actual Docker Hub username
          tags: |
            monishgowda045/python-app:latest
            monishgowda045/python-app:${{ github.sha }}
      # ... (Steps 1, 2, and 3 remain the same)

      # 4. Verify by running the container (Smoke Test with API Key)
      - name: Run Container Test
        env:
          # This pulls the secret from GitHub and makes it available to the shell
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          docker run --rm \
            -e OPENAI_API_KEY="$OPENAI_API_KEY" \
            monishgowda045/python-app:latest \
            python main.py      

            

      # 4. Verify by running the container (Optional Smoke Test)
      - name: Run Container Test
        run: |
          docker run --rm monishgowda045/python-app:latest python --version
