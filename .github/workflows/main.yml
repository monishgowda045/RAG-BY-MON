name: Python Docker Build and Push

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: 

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    # GLOBAL SECRET INJECTION:
    # This makes the key available to every step in this job
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 1. Setup Python environment
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies & Lint
        run: |
          python -m pip install --upgrade pip
          pip install flake8
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      # 2. Log in to Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      # 3. Build and Push the Docker image
      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # We pass the secret as a build-arg just in case your Dockerfile 
          # needs it during the image creation phase
          build-args: |
            OPENAI_API_KEY=${{ env.OPENAI_API_KEY }}
          tags: |
            monishgowda045/python-app:latest
            monishgowda045/python-app:${{ github.sha }}

      # 4. Verify by running the container (The Smoke Test)
      # Now it passes the key into the container so it won't crash!
      - name: Run Container Test
        run: |
          docker run --rm \
            -e OPENAI_API_KEY="${{ env.OPENAI_API_KEY }}" \
            monishgowda045/python-app:latest \
            python main.py
