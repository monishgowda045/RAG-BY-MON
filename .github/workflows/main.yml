name: Build Project - Testing Branch

on:
  push:
    branches: [ "monishgowda-patch-1" ]
  pull_request:
    branches: [ "monishgowda-patch-1" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Pull the code from your repo into the runner
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Set up Node.js environment
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 3. Run the actual build commands
      - name: Install and Build
        run: |
          npm install
          npm run build
