name: Python Docker Build and Push (Optimized)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: 

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      # This sets up Docker Buildx, which is required for advanced caching
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            monishgowda045/python-app:latest
            monishgowda045/python-app:${{ github.sha }}
          # THE CACHING MAGIC HAPPENS HERE:
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Container Test
        run: |
          docker run --rm \
            -e OPENAI_API_KEY="${{ env.OPENAI_API_KEY }}" \
            monishgowda045/python-app:latest \
            python main.py
