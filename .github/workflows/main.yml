name: Build and Test Project

on:
  push:
    branches: [ "monishgowda-patch-1" ]
  pull_request:
    branches: [ "monishgowda-patch-1" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm' # This speeds up future runs by caching your dependencies

      - name: Install Dependencies
        run: npm install

      - name: Run Tests
        run: npm test  # This looks for a "test" script in your package.json

      - name: Build Project
        run: npm run build
