name: Build Project

# This is the "detector" for code changes
on:
  push:
    branches: [ "monishgowda-patch-1" ]  # Triggers only when code is pushed to main
  pull_request:
    branches: [ "monishgowda-patch-1" ]  # Also triggers when someone opens a PR to main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Pull the code from your repo into the runner
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Set up your environment (Example: Node.js, Python, or Go)
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-speed: '20'

      # 3. Run the actual build command
      - name: Install and Build
        run: |
          npm install
          npm run build
